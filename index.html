<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portal Dimensional</title>

  <!-- AFRAME -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <!-- PARTICULAS -->  

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
      font-family: Arial, sans-serif;
    }

    .hint {
      position: absolute;
      z-index: 999;
      top: 20px;
      width: 100%;
      text-align: center;
      color: white;
      font-size: 18px;
      letter-spacing: 2px;
      text-shadow: 0 0 10px cyan;
    }
  </style>
</head>

<body>

<div class="hint">
  CLICK EN EL LENTE DE LA CÁMARA
</div>

<a-scene fog="type: exponential; color: #000; density: 0.03">

  <!-- SKY INICIAL -->
  <a-sky id="sky" color="#050510"></a-sky>

  <!-- LUCES -->
  <a-light type="ambient" color="#888"></a-light>

  <a-light
    type="point"
    intensity="2"
    color="#00ffff"
    position="0 5 5">
  </a-light>

  <a-light
    type="point"
    intensity="1.5"
    color="#ff00ff"
    position="0 3 -5">
  </a-light>


  <!-- CAMARA DEL USUARIO -->
  <a-entity position="0 1.6 8">
    <a-camera>
      <a-cursor color="#00ffff"></a-cursor>
    </a-camera>
  </a-entity>

  <!-- CAMARA GIGANTE -->
  <a-entity id="megaCamera" position="0 2 -4">

    <!-- CUERPO -->
    <a-box
      width="4"
      height="2.5"
      depth="2"
      color="#111"
      metalness="1"
      roughness="0.2">
    </a-box>

    <!-- LENTE EXTERNO -->
    <a-cylinder
      position="0 0 1.2"
      radius="0.9"
      height="1"
      rotation="90 0 0"
      color="#222">
    </a-cylinder>

    <!-- PORTAL -->
    <a-circle
      id="portal"
      position="0 0 1.75"
      radius="0.65"
      color="#000"
      shader="flat"
      class="clickable"
      animation="
        property: rotation;
        to: 0 0 360;
        loop: true;
        dur: 6000;
        easing: linear">
    </a-circle>

    <!-- ARO GLOW -->
    <a-ring
      position="0 0 1.76"
      radius-inner="0.68"
      radius-outer="0.78"
      color="#00ffff"
      animation="
        property: material.emissiveIntensity;
        dir: alternate;
        dur: 1000;
        loop: true;
        to: 2">
    </a-ring>

  </a-entity>

  <!-- TEXTO -->
  <a-text
    id="welcome"
    value=""
    align="center"
    color="#00ffff"
    width="12"
    position="0 4 -6">
  </a-text>

</a-scene>

<script>

const portal = document.querySelector("#portal");
const sky = document.querySelector("#sky");
const welcome = document.querySelector("#welcome");
const megaCamera = document.querySelector("#megaCamera");

let activated = false;

portal.addEventListener("click", () => {

  if (activated) return;
  activated = true;

  // CAMBIO DE MUNDO
  sky.setAttribute("animation", {
    property: "color",
    to: "#220044",
    dur: 3000
  });

  // CRECER PORTAL
  portal.setAttribute("animation__scale", {
    property: "scale",
    to: "8 8 8",
    dur: 2500,
    easing: "easeInOutQuad"
  });

  // GIRAR CAMARA
  megaCamera.setAttribute("animation__rotate", {
    property: "rotation",
    to: "0 360 0",
    dur: 4000,
    easing: "easeInOutExpo"
  });

  // TEXTO DRAMATICO
  setTimeout(() => {

    welcome.setAttribute("value", "WELCOME TO THE DIMENSION");

  }, 1500);

});

</script>

</body>
</html>
