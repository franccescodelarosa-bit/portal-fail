<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DIMENSION MODE REALTIME</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      overflow:hidden;
      background:black;
      font-family:Arial, sans-serif;
    }

    /* =========================
       VIDEO FONDO
    ========================= */

    #webcam{
      position:fixed;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      z-index:1;
      transform:scaleX(-1);
    }

    /* =========================
       OSCURIDAD
    ========================= */

    #darkness{
      position:fixed;
      inset:0;

      background:rgba(0,0,0,0);

      transition:1s;

      z-index:2;

      pointer-events:none;

      backdrop-filter:blur(0px);
    }

    #darkness.active{

      background:rgba(0,0,0,0.90);

      backdrop-filter:blur(5px);
    }

    /* =========================
       ESTRELLAS
    ========================= */

    #stars{
      position:fixed;
      inset:0;

      z-index:3;

      opacity:0;

      transition:1s;

      pointer-events:none;
    }

    #stars.active{
      opacity:1;
    }

    .star{
      position:absolute;

      width:2px;
      height:2px;

      background:white;

      border-radius:50%;

      animation:
        float 4s infinite alternate;
    }

    @keyframes float{

      from{
        transform:translateY(0px);
        opacity:0.3;
      }

      to{
        transform:translateY(-20px);
        opacity:1;
      }

    }

    /* =========================
       BOTON
    ========================= */

    #hideBtn{

      position:fixed;

      top:30px;
      left:50%;

      transform:translateX(-50%);

      z-index:999;

      padding:16px 40px;

      border:none;

      border-radius:50px;

      background:rgba(0,0,0,0.45);

      color:#00ffff;

      font-size:20px;

      letter-spacing:4px;

      cursor:pointer;

      transition:0.4s;

      backdrop-filter:blur(10px);

      box-shadow:
        0 0 10px #00ffff,
        0 0 30px #00ffff;
    }

    #hideBtn:hover{

      transform:
        translateX(-50%)
        scale(1.08);

      box-shadow:
        0 0 20px #00ffff,
        0 0 60px #00ffff;
    }

    /* =========================
       MENSAJE
    ========================= */

    #message{

      position:fixed;

      bottom:60px;

      width:100%;

      text-align:center;

      z-index:10;

      color:white;

      font-size:40px;

      letter-spacing:8px;

      opacity:0;

      transition:1s;

      text-shadow:
        0 0 20px #00ffff,
        0 0 50px #00ffff;
    }

    #message.active{
      opacity:1;
    }

  </style>
</head>

<body>

<!-- =========================
     WEBCAM
========================= -->

<video
  id="webcam"
  autoplay
  muted
  playsinline>
</video>

<!-- =========================
     OSCURIDAD
========================= -->

<div id="darkness"></div>

<!-- =========================
     ESTRELLAS
========================= -->

<div id="stars"></div>

<!-- =========================
     BOTON
========================= -->

<button id="hideBtn">
  HIDE
</button>

<!-- =========================
     TEXTO
========================= -->

<div id="message">
  DIMENSION MODE
</div>

<!-- =========================
     FIREBASE + APP
========================= -->

<script type="module">

/* =========================
   FIREBASE
========================= */

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

import {
  getDatabase,
  ref,
  set,
  onValue
}
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

/* =========================
   CONFIG
========================= */

const firebaseConfig = {

  apiKey: "AIzaSyCynJecnB3V5E5mZkg0TkDkaCfmvkZXgAk",

  authDomain:
    "dimension-portal-bb235.firebaseapp.com",

  databaseURL:
    "https://dimension-portal-bb235-default-rtdb.firebaseio.com",

  projectId:
    "dimension-portal-bb235",

  storageBucket:
    "dimension-portal-bb235.firebasestorage.app",

  messagingSenderId:
    "892762879486",

  appId:
    "1:892762879486:web:e836a2a452233375607caf",

  measurementId:
    "G-397EX4988L"

};

/* =========================
   INIT
========================= */

const app =
  initializeApp(firebaseConfig);

const db =
  getDatabase(app);

const portalRef =
  ref(db, "portal/state");

/* =========================
   WEBCAM
========================= */

async function startWebcam(){

  const video =
    document.getElementById("webcam");

  try{

    const stream =
      await navigator.mediaDevices.getUserMedia({
        video:true,
        audio:false
      });

    video.srcObject = stream;

  }catch(error){

    console.error(
      "WEBCAM ERROR",
      error
    );

  }

}

startWebcam();

/* =========================
   ESTRELLAS
========================= */

const starsContainer =
  document.getElementById("stars");

for(let i = 0; i < 250; i++){

  const star =
    document.createElement("div");

  star.classList.add("star");

  star.style.left =
    Math.random() * 100 + "%";

  star.style.top =
    Math.random() * 100 + "%";

  star.style.animationDuration =
    (2 + Math.random() * 5) + "s";

  star.style.opacity =
    Math.random();

  star.style.transform =
    `scale(${Math.random() * 2})`;

  starsContainer.appendChild(star);

}

/* =========================
   ELEMENTOS
========================= */

const btn =
  document.getElementById("hideBtn");

const darkness =
  document.getElementById("darkness");

const message =
  document.getElementById("message");

let active = false;

/* =========================
   CLICK GLOBAL
========================= */

btn.addEventListener("click", async () => {

  active = !active;

  await set(portalRef, {
    active
  });

});

/* =========================
   REALTIME GLOBAL
========================= */

onValue(portalRef, (snapshot) => {

  const data = snapshot.val();

  if(!data) return;

  const enabled =
    data.active;

  darkness.classList.toggle(
    "active",
    enabled
  );

  starsContainer.classList.toggle(
    "active",
    enabled
  );

  message.classList.toggle(
    "active",
    enabled
  );

  btn.innerText =
    enabled
      ? "RETURN"
      : "HIDE";

  active = enabled;

});

</script>

</body>
</html>
